  - id: abs-reits-income-enhancement
    workflow: data-assisted-analysis
    prompt: "请分析 ABS 和公募 REITs 是否能作为固收组合票息增强来源；没有底层资产现金流和流动性数据时只给尽调框架。"
    required_files:
      - references/00-routing.md
      - references/playbooks/abs-reits.md
      - references/02-data-source-policy.md
      - references/09-data-interface-catalog.md
    forbidden:
