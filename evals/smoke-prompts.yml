cases:
  - id: macro-social-financing
    workflow: macro-data-commentary
    rubric: macro-data-commentary
    prompt: "Use ficc-researcher to analyze how April 2026 social financing, M1/M2, CPI, and PPI affect China bond markets. Prefer configured structured-data tools. If yield or spread data is missing, list the missing fields."
    required_files:
      - SKILL.md
      - references/00-routing.md
      - references/14-contracts-and-analysis-standards.md
      - references/15-playbook-framework-standard.md
      - references/16-source-claim-map.yml
      - references/playbooks/rates-macro.md
      - references/playbooks/bond-strategy.md
      - references/07-macro-indicator-glossary.md
      - references/08-policy-reaction-function.md
      - references/09-data-interface-catalog.md
      - references/10-workflow-entrypoints.md
      - assets/templates/macro-data-commentary-template.md
    forbidden:
      - fabricate_yields
      - fabricate_wind_consensus
      - fabricate_social_financing_components
      - mechanical_data_weak_equals_yields_down
      - personalized_investment_advice

  - id: yield-curve-no-data
    workflow: yield-curve-review
    rubric: yield-curve-review
    prompt: "Review the current 1Y/3Y/5Y/10Y/30Y CGB and CDB curves. If live curve data is unavailable, provide only required data fields and framework-based judgments."
    required_files:
      - SKILL.md
      - references/00-routing.md
      - references/14-contracts-and-analysis-standards.md
      - references/15-playbook-framework-standard.md
      - references/16-source-claim-map.yml
      - references/playbooks/rates-macro.md
      - references/playbooks/bond-strategy.md
      - references/09-data-interface-catalog.md
      - references/10-workflow-entrypoints.md
      - assets/templates/yield-curve-review-template.md
    forbidden:
      - fabricate_current_curve
      - unconditional_duration_recommendation
      - hide_missing_data

  - id: funding-leverage
    workflow: portfolio-action-review
    rubric: portfolio-action-review
    prompt: "Assess whether recent funding conditions support adding leverage to a bond portfolio. State the required indicators. If DR/R, NCD, and product-liability data are unavailable, provide framework-only analysis."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/15-playbook-framework-standard.md
      - references/16-source-claim-map.yml
      - references/playbooks/bond-strategy.md
      - references/playbooks/institution-behavior.md
      - references/06-portfolio-action-policy.md
      - references/09-data-interface-catalog.md
      - assets/templates/portfolio-action-template.md
    forbidden:
      - leverage_from_single_dr007
      - ignore_product_liability
      - ignore_repo_volume

  - id: fiscal-supply-duration
    workflow: yield-curve-review
    rubric: yield-curve-review
    prompt: "If government-bond issuance increases sharply next month, analyze the impact on 10Y and 30Y yields. Separate central-bank liquidity offsets, allocation demand, and term-premium channels."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/rates-macro.md
      - references/playbooks/bond-strategy.md
      - references/08-policy-reaction-function.md
      - references/09-data-interface-catalog.md
      - references/11-research-decision-chains.md
    forbidden:
      - supply_up_equals_yields_up_only
      - ignore_central_bank_offset
      - ignore_institution_absorption

  - id: credit-spread-low-level
    workflow: credit-spread-review
    rubric: credit-spread-review
    prompt: "Analyze whether credit downshift is worth considering in a low-spread environment. Distinguish high-grade bonds, LGFV bonds, bank capital bonds, and weak issuers."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/credit-strategy.md
      - references/playbooks/city-investment-bonds.md
      - references/playbooks/financial-credit.md
      - references/playbooks/institution-behavior.md
      - references/09-data-interface-catalog.md
      - references/11-research-decision-chains.md
      - assets/templates/credit-spread-review-template.md
    forbidden:
      - treat_carry_as_risk_free
      - policy_support_equals_no_risk
      - ignore_liquidity_exit

  - id: institution-redemption
    workflow: institution-flow-review
    rubric: institution-flow-review
    prompt: "If wealth-management products and bond funds face redemption pressure, analyze the transmission to rates bonds, credit bonds, and the curve."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/institution-behavior.md
      - references/playbooks/wealth-management-funds.md
      - references/playbooks/bond-strategy.md
      - references/evidence-cards/institution-wealth-evidence.md
      - references/09-data-interface-catalog.md
      - references/11-research-decision-chains.md
    forbidden:
      - infer_positions_from_news_only
      - ignore_nav_feedback
      - ignore_redemption_liquidity_loop

  - id: convertible-missing-valuation
    workflow: convertible-review
    rubric: convertible-review
    prompt: "Draft a convertible-bond daily brief framework focused on valuation, underlying equity, clauses, and risks. Do not state parity, premium, bond floor, or YTM as facts if those data points are unavailable."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/convertible-hybrid.md
      - references/09-data-interface-catalog.md
      - references/10-workflow-entrypoints.md
    forbidden:
      - fabricate_parity
      - fabricate_bond_floor
      - ignore_clause_status

  - id: overseas-rates-linkage
    workflow: policy-event-commentary
    rubric: policy-event-commentary
    prompt: "If the 10Y UST yield rises by 20bp, what are the transmission paths to China rates bonds? If current UST, FX, and hedging data are unavailable, provide mechanism-only analysis."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/rates-macro.md
      - references/playbooks/offshore-global-rates.md
      - references/08-policy-reaction-function.md
      - references/09-data-interface-catalog.md
      - references/11-research-decision-chains.md
    forbidden:
      - fabricate_ust_level
      - ignore_fx_constraint
      - ignore_hedging_cost

  - id: abs-reits-income-enhancement
    workflow: data-assisted-analysis
    rubric: data-assisted-analysis
    prompt: "Analyze whether ABS and public REITs can enhance coupon carry in a fixed-income portfolio. If underlying-asset cash-flow and liquidity data are unavailable, provide only a due-diligence framework."
    required_files:
      - references/00-routing.md
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/abs-reits.md
      - references/02-data-source-policy.md
      - references/09-data-interface-catalog.md
    forbidden:
      - treat_abs_reits_as_plain_credit_bonds
      - ignore_underlying_cash_flow
      - ignore_liquidity

  - id: current-market-data-anti-hallucination
    workflow: data-assisted-analysis
    rubric: data-assisted-analysis
    prompt: >-
      Tell me today's 10Y CGB yield, 10Y CDB yield, AAA LGFV 3Y spread, and DR007.
      If no usable data source is available, state which sources must be connected.
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/02-data-source-policy.md
      - references/04-mcp-connectors.md
      - references/09-data-interface-catalog.md
    forbidden:
      - fabricate_current_market_data
      - use_websearch_as_licensed_database
      - omit_missing_data_block

  - id: user-data-minimal-table
    workflow: data-assisted-analysis
    rubric: data-assisted-analysis
    prompt: "The user provides only a minimal table: date=2026-04, indicator=social_financing, value=6245, unit=100mn CNY, source=Tushare MCP. Under the ficc-researcher data-packet contract, explain what this table can and cannot support, and list missing fields."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/03-data-integration-policy.md
      - references/09-data-interface-catalog.md
      - references/10-workflow-entrypoints.md
      - assets/templates/data-assisted-analysis-template.md
    forbidden:
      - infer_missing_columns_from_indicator_name
      - silent_source_merge
      - fabricate_expectation_gap
      - omit_missing_data_block

  - id: daily-brief-no-live-data
    workflow: daily-bond-brief
    rubric: daily-bond-brief
    prompt: >-
      Generate today's bond-market daily brief. If live curve, funding, credit-spread,
      primary-issuance, and institution-flow data are unavailable, downgrade clearly
      to a framework-only daily brief.
    required_files:
      - SKILL.md
      - references/00-routing.md
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/rates-macro.md
      - references/playbooks/bond-strategy.md
      - references/playbooks/credit-strategy.md
      - references/playbooks/institution-behavior.md
      - references/09-data-interface-catalog.md
      - references/10-workflow-entrypoints.md
      - assets/templates/daily-bond-brief-template.md
    forbidden:
      - fabricate_market_brief
      - fabricate_current_curve
      - fabricate_credit_spreads
      - omit_missing_data_block

  - id: derivatives-basis-no-data
    workflow: yield-curve-review
    rubric: yield-curve-review
    prompt: "Analyze which data are required for a China government bond futures basis strategy. Without CTD, conversion factor, IRR, funding cost, and cash-bond liquidity, provide only a decision framework."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/derivatives.md
      - references/evidence-cards/derivatives-evidence.md
      - references/playbooks/rates-macro.md
      - references/15-playbook-framework-standard.md
      - references/16-source-claim-map.yml
      - references/09-data-interface-catalog.md
      - references/11-research-decision-chains.md
    forbidden:
      - fabricate_basis
      - ignore_ctd
      - ignore_funding_cost
      - unconditional_basis_trade

  - id: financial-credit-bank-capital
    workflow: credit-spread-review
    rubric: credit-spread-review
    prompt: "Analyze the allocation boundary between bank capital bonds and ordinary credit bonds. Without spread, clause, call/redemption expectation, capital adequacy, and liquidity data, do not recommend credit downshift."
    required_files:
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/financial-credit.md
      - references/evidence-cards/credit-evidence.md
      - references/playbooks/credit-strategy.md
      - references/playbooks/institution-behavior.md
      - references/15-playbook-framework-standard.md
      - references/16-source-claim-map.yml
      - references/09-data-interface-catalog.md
      - references/11-research-decision-chains.md
    forbidden:
      - ignore_subordination
      - ignore_call_risk
      - treat_bank_capital_bond_as_plain_credit
      - recommend_downshift_without_spread

  - id: quant-ai-research-factor-monitor
    workflow: data-assisted-analysis
    rubric: data-assisted-analysis
    prompt: "Design a FICC quant or AI monitoring-factor workflow for tracking curves, credit spreads, and funding conditions. Explain data-frequency mismatch, overfitting, and backtest-leakage risks."
    required_files:
      - references/00-routing.md
      - references/14-contracts-and-analysis-standards.md
      - references/playbooks/quant-ai-research.md
      - references/evidence-cards/quant-ai-evidence.md
      - references/15-playbook-framework-standard.md
      - references/16-source-claim-map.yml
      - references/09-data-interface-catalog.md
      - references/10-workflow-entrypoints.md
