      - 数据来源
      - 估值拆解
      - 正股弹性
      - 债底保护
      - 条款状态
      - 风险与反例

  daily-bond-brief:
    required_blocks:
      - 今日结论
      - 数据事实
      - 利率债
      - 信用债
      - 资金面
      - 供给与一级
      - 机构行为
      - 风险与反例

  data-assisted-analysis:
    required_blocks:
      - 问题归类
      - 数据输入
      - 数据质量检查
      - 框架事实
      - 数据事实
      - 推断判断
      - 缺失数据
      - 风险与反例
