contracts:
  macro-data-commentary:
    required_blocks:
      - 问题归类
      - 使用 playbook
      - 数据来源与时间
      - 数据事实
      - 预期差
      - 政策反应函数
      - 债市传导
      - 不能确认的部分
      - 风险与反例
      - 后续跟踪

  yield-curve-review:
    required_blocks:
      - 曲线数据来源
      - 期限分段
      - 短端驱动
      - 中端驱动
      - 长端驱动
      - 供需与机构行为
      - 缺少数据
      - 风险触发

  credit-spread-review:
    required_blocks:
      - 利差数据来源
      - 分评级
      - 分期限
      - 信用风险
      - 流动性补偿
      - 机构需求
      - 下沉边界
      - 风险与反例

  institution-flow-review:
    required_blocks:
      - 机构类型
      - 负债稳定性
      - 资产配置
      - 净值反馈
      - 市场传导
      - 缺少数据
      - 风险与反例

  portfolio-action-review:
    required_blocks:
      - 组合背景
      - 当前判断
      - 情景表
      - 持有期收益拆解
      - 主要亏损路径
      - 需要补充的数据
      - 风险提示

  policy-event-commentary:
    required_blocks:
      - 政策事实
      - 政策目标
      - 政策工具
      - 政策约束
      - 预期差
      - 债市传导
      - 风险与反例
      - 后续跟踪

  convertible-review:
