  - claim_id: OFF-01
    playbook: offshore-global-rates
    claim: Offshore valuation separates global risk-free rates, Fed path, FX and hedge cost, issuer credit, legal terms, cross-border policy, and liquidity.
    evidence_card: offshore-global-rates-evidence.md
    evidence_section: Core Framework Claims
    source_ids:
      - cicc-us-treasuries-framework-2025
      - cicc-offshore-credit-usd-dim-sum-2025
      - cicc-offshore-rmb-bonds-2025
    decision_chain: Offshore Rates And Credit To Domestic FICC

  - claim_id: ABS-01
    playbook: abs-reits
    claim: ABS and REITs require bottom-up asset-pool or project cash-flow, waterfall or distribution mechanics, legal structure, valuation, liquidity, and investor-demand analysis.
    evidence_card: abs-reits-evidence.md
    evidence_section: Core Framework Claims
    source_ids:
      - cicc-abs-framework-2025
      - cicc-public-reits-strategy-2025
      - huatai-credit-bond-framework-2025
    decision_chain: Credit Spread To Allocation

  - claim_id: QA-01
    playbook: quant-ai-research
    claim: FICC quant research starts from point-in-time data contracts, release lag, frequency alignment, entity mapping, labels, costs, and validation before factor performance claims.
    evidence_card: quant-ai-evidence.md
    evidence_section: Core Framework Claims
    source_ids:
      - huatai-quant-ai-ficc-2025
      - cicc-ficc-ai-agent-path-2025
    decision_chain: Macro Release To Rates

  - claim_id: QA-02
    playbook: quant-ai-research
    claim: AI agents can parse, route, summarize, monitor, and generate candidates, but they are not market-data sources and must keep human review for investment and risk decisions.
    evidence_card: quant-ai-evidence.md
    evidence_section: Common Misreadings
    source_ids:
      - huatai-quant-ai-ficc-2025
      - cicc-ficc-ai-agent-path-2025
    decision_chain: Policy Event To Portfolio
